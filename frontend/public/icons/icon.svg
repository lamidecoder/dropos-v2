<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B35E8"/>
      <stop offset="100%" stop-color="#2A0D7A"/>
    </linearGradient>
    <linearGradient id="zap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" fill="rgba(255,255,255,0.04)"/>
  <!-- Zap lightning - clean geometric -->
  <path d="M296 72 L176 272 H252 L216 440 L352 216 H272 L312 72 Z" fill="url(#zap)" filter="url(#glow)"/>
</svg>
